<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="favicon.ico" />
    <title>Ward Attendance</title>
    <meta name="author" content="Bruno Câmara dos Santos" />
    <meta
      name="description"
      content="Display and analyze attendance statistics for a ward"
    />
    <meta property="og:title" content="Ward Attendance" />
    <meta
      property="og:description"
      content="Register and show statistics about the ward attendance"
    />
    <!-- <meta property="og:image" content="###########################"> -->
    <meta property="og:locale" content="en_US" />

    <!-- Style -->
    <link rel="stylesheet" href="./styles/normalize.css" />
    <link rel="stylesheet" href="./styles/base.css" />
    <link rel="stylesheet" href="./styles/medium.css" />
    <link rel="stylesheet" href="./styles/large.css" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Roboto+Condensed:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
    <!-- Scripts -->
    <script src="./scripts/header.js" defer></script>
    <script src="./scripts/theme.js" defer></script>
    <script type="module" src="./scripts/social.mjs"></script>
    <script type="module" src="./scripts/footer.mjs"></script>

    <script type="module" src="./scripts/update-members.mjs"></script>
    <script type="module" src="./scripts/import-members.mjs"></script>
    <script type="module" src="./scripts/table.mjs"></script>
    <script type="module" src="./scripts/attendance.mjs"></script>
  </head>
  <body>
    <header>
      <section>
        <button id="hambutton"></button>
        <div id="brand">
          <img
            src="images/main-ico.svg"
            alt="main ico"
            width="22"
            height="22"
          />
          <span>Ward Attendance</span>
        </div>
        <img
          id="theme"
          src="images/light-theme.svg"
          alt="button toggle theme"
          width="44"
          height="44"
        />
      </section>
      <nav id="navigation">
        <ul>
          <li class="current"><a href="addmember.html">Attendance</a></li>
          <li><a href="leadership.html">Leadership</a></li>
          <li><a href="addmember.html">Add Member</a></li>
        </ul>
      </nav>
    </header>
    <main>
      <div class="cards-grid">
        <section id="day-control">
          <button id="back" aria-label="back button"></button>
          <p id="currentDay"></p>
          <button id="next" aria-label="next button"></button>
        </section>

        <section id="weather">
          <img
            src="https://openweathermap.org/img/wn/04n@2x.png"
            alt="current weather"
            width="44"
            height="44"
          />
          <p id="temp"></p>
          <p id="current-weather"></p>
          <p id="city"></p>
        </section>

        <div id="search-members">
          <input
            id="member-filter"
            type="text"
            placeholder="🔍︎ Search Members"
          />
        </div>

        <div id="group-filter">
          <select name="group" id="group">
    
          </select>
        </div>

        <div id="attendance-buttons-control">
          <button id="mark-all">MARK ALL</button>
          <button id="clear">CLEAR</button>
        </div>
      </div>
      <section id="member-table"></section>

      <div id="resume-flex">
        <section id="resume">
          <p id="present">Present: <span>44</span></p>
          <p id="absent">Absent: <span>7</span></p>
          <p id="totalmembers">Total Members: <span>99</span></p>
        </section>
      </div>
      <dialog id="notesDialog">
        <div class="dialog-header">
          <h2 id="dialogName">Member Name</h2>
          <button id="closeDialog" aria-label="Close dialog">✕</button>
        </div>

        <div class="dialog-content">
          <div class="info-grid">
            <p>
              <strong>Leadership:</strong> <span id="dialogLeadership"></span>
            </p>
            <p>
              <strong>Organization:</strong>
              <span id="dialogOrganization"></span>
            </p>
            <p><strong>Phone:</strong> <span id="dialogPhone"></span></p>
            <p><strong>Address:</strong> <span id="dialogAddress"></span></p>
            <p><strong>Age:</strong> <span id="dialogAge"></span></p>
            <p><strong>Gender:</strong> <span id="dialogGender"></span></p>
          </div>

          <div class="notes-section">
            <label for="dialogNotes"><strong>Notes</strong></label>
            <textarea
              id="dialogNotes"
              rows="5"
              placeholder="Write notes here..."
            ></textarea>
          </div>
        </div>

        <div class="dialog-footer">
          <button id="saveNotesBtn">Save</button>
        </div>
      </dialog>
    </main>

    <footer></footer>
  </body>
</html>
