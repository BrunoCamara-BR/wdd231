<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="favicon.ico" />
    <title>Add Member</title>
    <meta name="author" content="Bruno Câmara dos Santos" />
    <meta
      name="description"
      content="Display a form to add new members in the data for ward attendance"
    />
    <meta property="og:title" content="Add Member" />
    <meta
      property="og:description"
      content="Display a form to add new members in the data for ward attendance"
    />

    <meta
      property="og:image"
      content="https://brunocamara-br.github.io/wdd231/finalproject/images/og.image.addmember.webp"
    />
    <meta
      property="og:url"
      content="https://brunocamara-br.github.io/wdd231/finalproject/addmember.html"
    />
    <meta property="og:locale" content="en_US" />

    <!-- Style -->
    <link rel="stylesheet" href="./styles/normalize.css" />
    <link rel="stylesheet" href="./styles/base.css" />
    <link rel="stylesheet" href="./styles/medium.css" />
    <link rel="stylesheet" href="./styles/large.css" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Roboto+Condensed:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
    <!-- Scripts -->
    <script src="./scripts/header.js" defer></script>
    <script src="./scripts/theme.js" defer></script>
    <script type="module" src="./scripts/social.mjs"></script>
    <script type="module" src="./scripts/footer.mjs"></script>

    <script type="module" src="./scripts/addmember.js"></script>
  </head>
  <body>
    <header>
      <section>
        <button id="hambutton" aria-label="button navigation menu"></button>
        <div id="brand">
          <img
            src="images/main-ico.svg"
            alt="main ico"
            width="22"
            height="22"
          />
          <span>Ward Attendance</span>
        </div>
        <img
          id="theme"
          src="images/light-theme.svg"
          alt="button toggle theme"
          width="44"
          height="44"
        />
      </section>
      <nav id="navigation">
        <ul>
          <li><a href="index.html">Attendance</a></li>
          <li><a href="leadership.html">Leadership</a></li>
          <li class="current"><a href="addmember.html">Add Member</a></li>
        </ul>
      </nav>
    </header>

    <main class="add-member-main">
      <section class="form-section">
        <h1 class="form-title">Add Member</h1>

        <form method="get" action="thankyou.html" id="add-member-form">
          <fieldset class="form-fieldset">
            <legend>Personal Information</legend>

            <label for="fullName">Full Name</label>
            <input
              type="text"
              id="fullName"
              name="fullName"
              placeholder="Jhon Brown"
              required
            />

            <label for="gender">Gender</label>
            <select id="gender" name="gender" class="form-select" required>
              <option value="" disabled selected>Select gender</option>
              <option value="Male">Male</option>
              <option value="Female">Female</option>
            </select>

            <label for="age">Age</label>
            <input
              type="number"
              id="age"
              name="age"
              placeholder="18"
              required
            />
          </fieldset>

          <fieldset class="form-fieldset">
            <legend>Contact</legend>

            <label for="address">Address</label>
            <input
              type="text"
              id="address"
              name="address"
              placeholder="99 Rio St, Progresso, Sete Lagoas, MG"
            />

            <label for="cellPhone">Cell Phone</label>
            <input
              type="tel"
              id="cellPhone"
              name="cellPhone"
              placeholder="+1 123 456 789"
              required
            />
          </fieldset>

          <fieldset class="form-fieldset">
            <legend>Organization</legend>

            <label for="organization">Organization</label>
            <select
              id="organization"
              name="organization"
              class="form-select"
              required
            >
              <option value="" disabled selected>Select organization</option>
              <option value="Bishopric">Bishopric</option>
              <option value="Elders Quorum">Elders Quorum</option>
              <option value="Relief Society">Relief Society</option>
              <option value="Young Men">Young Men</option>
              <option value="Young Women">Young Women</option>
              <option value="Primary">Primary</option>
            </select>

            <label for="leadership">Leadership</label>
            <input type="text" id="leadership" name="leadership" />
          </fieldset>

          <button type="submit" id="add-member-btn">Add Member</button>
        </form>
      </section>
    </main>
    <footer></footer>
  </body>
</html>
