<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="favicon.ico" />
    <title>Add New Member</title>
    <meta name="author" content="Bruno Câmara dos Santos" />
    <meta name="description" content="Add a new ward member" />
    <meta property="og:title" content="Add New Member" />
    <meta
      property="og:description"
      content="Add a new member to the ward list"
    />
    <meta property="og:locale" content="en_US" />

    <link rel="stylesheet" href="./styles/normalize.css" />
    <link rel="stylesheet" href="./styles/base.css" />
    <link rel="stylesheet" href="./styles/medium.css" />
    <link rel="stylesheet" href="./styles/large.css" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Roboto+Condensed:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />

    <script src="./scripts/header.js" defer></script>
    <script src="./scripts/theme.js" defer></script>
    <script type="module" src="./scripts/social.mjs"></script>
    <script type="module" src="./scripts/footer.mjs"></script>
    <script type="module" src="./scripts/addmember.mjs"></script>
  </head>
  <body>
    <header>
      <section>
        <button id="hambutton" type="button" aria-label="Menu button"></button>
        <div id="brand">
          <img
            src="images/main-ico.svg"
            alt="main icon"
            width="22"
            height="22"
          />
          <span>Ward Attendance</span>
        </div>
        <img
          id="theme"
          src="images/light-theme.svg"
          alt="theme toggle button"
          width="44"
          height="44"
        />
      </section>
      <nav id="navigation">
        <ul>
          <li><a href="index.html">Attendance</a></li>
          <li><a href="leadership.html">Leadership</a></li>
          <li class="current"><a href="addmember.html">Add Member</a></li>
        </ul>
      </nav>
    </header>

    <main>
      <section class="form-page">
        <div class="form-intro">
          <h1>Add New Member</h1>
          <p>Fill out the form to register a new ward member.</p>
        </div>

        <form
          id="add-member-form"
          class="member-form"
          method="post"
          action="thankyou.html"
        >
          <label>
            Full Name
            <input type="text" name="fullName" autocomplete="name" required />
          </label>

          <label>
            Sex
            <select name="sex" required>
              <option value="" selected disabled>Select a sex</option>
              <option value="Male">Male</option>
              <option value="Female">Female</option>
            </select>
          </label>

          <label>
            Age
            <input type="number" name="age" min="1" max="120" required />
          </label>

          <label class="wide">
            Address
            <input
              type="text"
              name="address"
              autocomplete="street-address"
              required
            />
          </label>

          <label>
            Cell Phone
            <input type="tel" name="cellPhone" autocomplete="tel" required />
          </label>

          <label>
            Organization
            <input type="text" name="organization" required />
          </label>

          <label class="wide">
            Leadership
            <input
              type="text"
              name="leadership"
              placeholder="Leave blank if there is no calling"
            />
          </label>

          <button type="submit" class="form-submit">Add New Member</button>
        </form>
      </section>
    </main>

    <footer></footer>
  </body>
</html>
