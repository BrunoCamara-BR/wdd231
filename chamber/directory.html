<!doctype html>

    <link rel="stylesheet" href="./styles/basic.css" />

    <script src="./scripts/navigation.js" defer></script>

  <body>
    <header>
      <div class="navigation-bar">

          alt="Sete Lagoas Chamber of Commerce logo"

        <a href="#" id="toggle-theme" class="theme"></a>

        <button

      </div>
      <nav id="nav-menu" class="navigation">
        <ul>
          <li><a href="#">Home</a></li>
          <li class="current"><a href="#">Directory</a></li>

        </ul>
      </nav>

    <main>
      <h1>Directory</h1>
      <div class="buttons-view">

          ><img
            src="images/grid.svg"
            alt="Grid view button"
            aria-label="Grid view button"
            width="10"
            height="10"
          />
          <span>Grid view</span>
        </a>
        <a href="#" id="list-button"
          ><img
            src="images/list.svg"
            alt="List view button"
            aria-label="List view button"
            width="10"
            height="10"
          />

        >

      <div class="cards-block">
